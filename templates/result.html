<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <script>(function(){try{var k='examguard-theme',t=localStorage.getItem(k)||'dark';document.documentElement.setAttribute('data-theme',t);}catch(e){document.documentElement.setAttribute('data-theme','dark');}})();</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ExamGuard AI — Result</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
  <style>
    .result-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
      position: relative;
    }

    .result-card {
      position: relative;
      z-index: 1;
      max-width: 560px;
      width: 100%;
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 50px 40px;
      text-align: center;
      box-shadow: 0 40px 80px rgba(0,0,0,0.5);
      animation: cardIn 0.6s cubic-bezier(0.34,1.56,0.64,1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(0.85) translateY(30px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .result-emoji {
      font-size: 80px;
      margin-bottom: 20px;
      display: block;
      animation: bounce 1s ease 0.5s both;
    }

    @keyframes bounce {
      0% { transform: scale(0); }
      60% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    .result-title {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 30px;
      font-weight: 700;
      color: white;
      margin-bottom: 8px;
    }

    .result-subtitle {
      color: var(--text-muted);
      font-size: 15px;
      margin-bottom: 40px;
    }

    .score-ring {
      width: 160px;
      height: 160px;
      margin: 0 auto 36px;
      position: relative;
    }

    .score-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .score-ring circle {
      fill: none;
      stroke-width: 10;
      stroke-linecap: round;
    }

    .score-ring .bg { stroke: rgba(255,255,255,0.08); }
    .score-ring .fg {
      stroke: url(#scoreGrad);
      stroke-dasharray: 440;
      stroke-dashoffset: 440;
      transition: stroke-dashoffset 1.5s cubic-bezier(0.4,0,0.2,1) 0.5s;
    }

    .score-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .score-number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 36px;
      font-weight: 800;
      color: white;
      line-height: 1;
    }

    .score-label {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 32px;
    }

    .stat-box {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 16px 10px;
    }

    .stat-box .val {
      font-size: 22px;
      font-weight: 700;
      color: white;
      margin-bottom: 4px;
    }

    .stat-box .lbl {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 24px;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      margin-bottom: 32px;
    }

    .status-chip.pass { background: rgba(67,233,123,0.15); color: var(--success); border: 1px solid rgba(67,233,123,0.3); }
    .status-chip.avg { background: rgba(247,151,30,0.15); color: var(--warning); border: 1px solid rgba(247,151,30,0.3); }
    .status-chip.fail { background: rgba(255,101,132,0.15); color: var(--danger); border: 1px solid rgba(255,101,132,0.3); }

    .btn-primary { padding: 14px 40px; font-size: 15px; }
  </style>
</head>
<body class="result-portal">
  <div class="bg-animated">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
  </div>

  <div class="result-page" style="position:relative;">
    <div style="position:absolute;top:20px;right:24px;z-index:2;">
      <label class="theme-toggle" title="Light / dark theme">
        <input type="checkbox" class="theme-toggle-input" aria-label="Use light theme">
        <span class="theme-toggle-track"><span class="theme-toggle-knob"></span></span>
        <span class="theme-toggle-label-text">Light</span>
      </label>
    </div>
    <div class="result-card">
      <span class="result-emoji" id="resultEmoji">🎉</span>
      <h1 class="result-title">Exam Completed!</h1>
      <p class="result-subtitle">Your responses have been submitted successfully</p>
      <p id="openEndedNote" style="display:none; color: var(--text-muted); font-size: 14px; max-width: 440px; margin: -24px auto 28px; line-height: 1.55;"></p>

      <!-- Score Ring -->
      <div class="score-ring">
        <svg viewBox="0 0 160 160">
          <defs>
            <linearGradient id="scoreGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stop-color="#6c63ff"/>
              <stop offset="100%" stop-color="#43e97b"/>
            </linearGradient>
          </defs>
          <circle class="bg" cx="80" cy="80" r="70"/>
          <circle class="fg" id="scoreCircle" cx="80" cy="80" r="70"/>
        </svg>
        <div class="score-center">
          <div class="score-number" id="scoreNum">—</div>
          <div class="score-label" id="scoreLabel">MCQ score</div>
        </div>
      </div>

      <!-- Status -->
      <div class="status-chip" id="statusChip">Loading...</div>

      <!-- Stats -->
      <div class="stats-row">
        <div class="stat-box">
          <div class="val" id="statCorrect">—</div>
          <div class="lbl">Correct</div>
        </div>
        <div class="stat-box">
          <div class="val" id="statWrong">—</div>
          <div class="lbl">Wrong</div>
        </div>
        <div class="stat-box">
          <div class="val" id="statPercent">—</div>
          <div class="lbl">Percentage</div>
        </div>
      </div>

      <button class="btn-primary" onclick="location.href='/'">Back to Home</button>
    </div>
  </div>

  <script>
    const result = JSON.parse(localStorage.getItem('examResult') || '{}');

    if (result.score !== undefined) {
      if (result.has_open_ended) {
        const el = document.getElementById('openEndedNote');
        el.style.display = 'block';
        el.textContent = 'Short-answer and written responses are saved for your instructor. The score above reflects multiple-choice questions only (auto-graded).';
        document.getElementById('scoreLabel').textContent = 'MCQ score (auto)';
      }
      const pct = result.percentage;
      const total = result.total;
      const score = result.score;
      const wrong = total - score;

      document.getElementById('scoreNum').textContent = `${score}/${total}`;
      document.getElementById('statCorrect').textContent = score;
      document.getElementById('statWrong').textContent = wrong;
      document.getElementById('statPercent').textContent = `${pct}%`;

      // Animate ring
      const circumference = 2 * Math.PI * 70;
      const offset = circumference - (pct / 100) * circumference;
      setTimeout(() => {
        document.getElementById('scoreCircle').style.strokeDashoffset = offset;
      }, 100);

      // Status
      const chip = document.getElementById('statusChip');
      const emoji = document.getElementById('resultEmoji');
      if (pct >= 70) {
        chip.textContent = '🏆 Passed';
        chip.className = 'status-chip pass';
        emoji.textContent = '🎉';
      } else if (pct >= 50) {
        chip.textContent = '📝 Average';
        chip.className = 'status-chip avg';
        emoji.textContent = '📊';
      } else {
        chip.textContent = '📚 Need Improvement';
        chip.className = 'status-chip fail';
        emoji.textContent = '💪';
      }
    }

    localStorage.removeItem('examResult');
  </script>
  <script src="{{ url_for('static', filename='js/theme-toggle.js') }}"></script>
</body>
</html>
